name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG" != "$FILE_VERSION" ]]; then
            echo "::error::Tag (v$TAG) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Read version
        run: |
          echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          PREV_TAG="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p' || true)"

          {
            if [[ -n "$PREV_TAG" ]]; then
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..HEAD" --oneline --no-merges --pretty=format:"- %s"
            else
              echo "## Initial Release"
              echo ""
              echo "First release of FlowAI — multi-agent terminal orchestrator."
            fi

            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo ""
            echo "**macOS / Linux:**"
            echo '```bash'
            echo 'curl -fsSL https://raw.githubusercontent.com/weprodev/FlowAI/main/install.sh | bash'
            echo '```'
            echo ""
            echo "**Windows (Git Bash):**"
            echo '```bash'
            echo 'curl -fsSL https://raw.githubusercontent.com/weprodev/FlowAI/main/install.sh | PREFIX="$HOME/.local" bash'
            echo '```'
            echo ""
            echo "### Upgrade"
            echo '```bash'
            echo 'flowai update'
            echo '```'
          } > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlowAI v${{ env.VERSION }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
