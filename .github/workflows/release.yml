name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  # ── Stage 1: Test on both macOS and Linux ──────────────────────────────────
  # Both must pass before we create a release.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq || true

      - name: Validate VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG" != "$FILE_VERSION" ]]; then
            echo "::error::Tag (v$TAG) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - name: Syntax check all scripts
        run: |
          errors=0
          for f in bin/flowai install.sh src/commands/*.sh src/phases/*.sh \
                   src/core/*.sh src/bootstrap/*.sh src/graph/*.sh; do
            if ! bash -n "$f" 2>&1; then
              echo "::error file=$f::Syntax error"
              errors=$((errors + 1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1
          echo "✓ All scripts pass syntax check"

      - name: Run test suite
        run: |
          FLOWAI_TEST_ALLOW_MISSING_TMUX=1 bash tests/run.sh

      - name: Install FlowAI
        run: |
          sudo bash install.sh

      - name: Verify installed commands
        run: |
          flowai version
          flowai --help
          flowai update --check
          fai version
          fai --help

  # ── Stage 2: Create GitHub Release ─────────────────────────────────────────
  # Only runs after BOTH macOS and Linux tests pass.
  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        run: |
          echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Generate changelog
        run: |
          PREV_TAG="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p' || true)"

          {
            if [[ -n "$PREV_TAG" ]]; then
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..HEAD" --oneline --no-merges --pretty=format:"- %s"
            else
              echo "## Initial Release"
              echo ""
              echo "First release of FlowAI — multi-agent terminal orchestrator."
            fi

            echo ""
            echo "---"
            echo ""
            echo "## Install"
            echo '```bash'
            echo 'curl -fsSL https://raw.githubusercontent.com/weprodev/FlowAI/main/install.sh | bash'
            echo '```'
            echo ""
            echo "## Upgrade"
            echo '```bash'
            echo 'flowai update'
            echo '```'
          } > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlowAI v${{ env.VERSION }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
